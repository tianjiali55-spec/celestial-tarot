<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mystic Vision Tarot · 灵启万物</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" crossorigin="anonymous"></script>
<style>
:root {
  --gold: #d4af37;
  --gold-light: #f0d68a;
  --gold-dark: #8a6e2f;
  --deep: #050508;
  --navy: #0b1026;
  --navy-light: #141b35;
  --cream: #f0e6d3;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  background: radial-gradient(ellipse at center, #161b35 0%, #0a0d1a 50%, #050508 100%);
  color: var(--cream);
  font-family: 'Noto Serif SC', 'Cormorant Garamond', serif;
  overflow: hidden;
}
.stars {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    radial-gradient(2px 2px at 20px 30px, rgba(240,214,138,.8), transparent),
    radial-gradient(1px 1px at 90px 40px, rgba(255,255,255,.7), transparent),
    radial-gradient(2px 2px at 160px 120px, rgba(240,214,138,.5), transparent),
    radial-gradient(1px 1px at 230px 80px, rgba(255,255,255,.6), transparent),
    radial-gradient(2px 2px at 300px 160px, rgba(240,214,138,.5), transparent),
    radial-gradient(1px 1px at 400px 50px, rgba(255,255,255,.7), transparent),
    radial-gradient(2px 2px at 500px 140px, rgba(240,214,138,.6), transparent);
  background-size: 520px 220px;
  opacity: .3;
  animation: twinkle 8s ease-in-out infinite alternate;
}
@keyframes twinkle { from { opacity: .2; } to { opacity: .45; } }
.fog {
  position: fixed; border-radius: 50%; filter: blur(100px); opacity: .12;
  pointer-events: none; z-index: 0;
}
.fog1 {
  width: 800px; height: 800px;
  background: radial-gradient(circle, #2a1b5a 0%, transparent 70%);
  top: -200px; left: -200px;
  animation: drift 30s infinite alternate;
}
.fog2 {
  width: 700px; height: 700px;
  background: radial-gradient(circle, #1a1340 0%, transparent 70%);
  bottom: -150px; right: -150px;
  animation: drift 25s infinite alternate-reverse;
}
@keyframes drift { from { transform: translate(-10%, -10%) scale(1); } to { transform: translate(10%, 10%) scale(1.3); } }
.hidden { display: none !important; }
.screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2; padding: 20px; text-align: center; }
.intro h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(40px, 9vw, 84px);
  color: var(--gold-light);
  letter-spacing: .25em;
  text-shadow: 0 0 35px rgba(212,175,55,.5);
}
.intro .subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(18px, 4vw, 28px);
  color: var(--gold);
  letter-spacing: .35em;
  text-transform: uppercase;
  margin-top: 8px;
  opacity: .8;
}
.separator { width: 180px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 26px 0; }
.intro label {
  font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold-dark);
  letter-spacing: .35em; text-transform: uppercase; margin-bottom: 14px;
}
.intro textarea {
  width: min(560px, 90vw); height: 120px;
  background: rgba(5,5,8,.55);
  border: 1px solid rgba(212,175,55,.35);
  border-radius: 24px; padding: 20px; color: var(--cream);
  font-family: inherit; font-size: 18px; text-align: center;
  outline: none; resize: none;
  backdrop-filter: blur(10px);
  box-shadow: inset 0 0 30px rgba(0,0,0,.4);
}
.intro textarea::placeholder { color: rgba(240,230,211,.25); }
.intro textarea:focus { border-color: rgba(212,175,55,.65); }
.ascend {
  margin-top: 28px; padding: 18px 64px; border-radius: 50px; border: none;
  background: linear-gradient(135deg, #9a7b2c, #5c4618); color: #fff;
  font-family: 'Cinzel', serif; font-size: 18px; letter-spacing: .35em;
  cursor: pointer; transition: all .35s;
  box-shadow: 0 0 25px rgba(212,175,55,.2);
}
.ascend:disabled { opacity: .4; cursor: not-allowed; filter: grayscale(.6); }
.ascend:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 0 45px rgba(212,175,55,.45); }
.init-status { margin-top: 16px; font-size: 12px; color: var(--gold-dark); letter-spacing: .15em; }
.stage { padding: 0; }
.topbar {
  width: 100%; display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px; background: rgba(5,5,8,.45);
  border-bottom: 1px solid rgba(212,175,55,.15);
  backdrop-filter: blur(8px);
}
.title-small { font-family: 'Cinzel', serif; font-size: 14px; color: var(--gold); letter-spacing: .25em; }
.status { font-size: 13px; color: var(--gold-light); letter-spacing: .05em; }
.top-actions { display: flex; gap: 8px; align-items: center; }
.top-actions button {
  background: linear-gradient(135deg, rgba(212,175,55,.18), rgba(212,175,55,.08));
  border: 1px solid rgba(212,175,55,.6); color: var(--gold-light);
  padding: 8px 14px; border-radius: 20px; cursor: pointer;
  font-family: inherit; font-size: 12px; letter-spacing: .04em;
  transition: all .25s; backdrop-filter: blur(4px); touch-action: manipulation;
}
.top-actions button:active { transform: scale(.96); }
.top-actions button:hover { background: linear-gradient(135deg, rgba(212,175,55,.32), rgba(212,175,55,.12)); box-shadow: 0 0 14px rgba(212,175,55,.25); }
#video { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
.gesture-canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 8; }
.main { flex: 1; display: flex; width: 100%; height: calc(100% - 56px); position: relative; }
.altar {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative; min-width: 0; gap: 18px; padding: 16px;
}
.ritual-ring {
  position: absolute; top: 50%; left: 50%;
  width: min(520px, 80vmin); height: min(520px, 80vmin);
  transform: translate(-50%, -50%);
  border: 1px solid rgba(212,175,55,.2);
  border-radius: 50%;
  box-shadow: 0 0 0 1px rgba(212,175,55,.08), inset 0 0 80px rgba(212,175,55,.06);
  animation: spin 60s linear infinite;
  pointer-events: none;
}
.ritual-ring::before {
  content: ''; position: absolute; inset: 12%;
  border: 1px dashed rgba(212,175,55,.18); border-radius: 50%;
}
.ritual-ring::after {
  content: ''; position: absolute; inset: 24%;
  border: 1px solid rgba(212,175,55,.12); border-radius: 50%;
}
.altar-glow {
  position: absolute; top: 50%; left: 50%;
  width: min(420px, 70vmin); height: min(420px, 70vmin);
  transform: translate(-50%, -50%);
  background: radial-gradient(circle, rgba(212,175,55,.10) 0%, transparent 70%);
  pointer-events: none;
}
@keyframes spin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
.fan {
  position: relative; width: min(900px, 98vw); height: 420px;
  perspective: 1400px; pointer-events: none; z-index: 5;
}
.card {
  position: absolute; left: 50%; top: 50%; width: 170px; height: 270px;
  margin-left: -85px; margin-top: -135px;
  transform-style: preserve-3d;
  transition: transform .6s cubic-bezier(.22,1,.36,1), opacity .4s;
  border-radius: 18px; box-shadow: 0 18px 55px rgba(0,0,0,.6);
}
.card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform .9s cubic-bezier(.22,1,.36,1); }
.card.flipped .card-inner { transform: rotateY(180deg); }
.face {
  position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden;
  border-radius: 18px; overflow: hidden;
  border: 2px solid rgba(212,175,55,.65);
  box-shadow: 0 14px 45px rgba(0,0,0,.55);
}
.back { background: url('card-back.png') center/cover no-repeat; }
.front {
  background: linear-gradient(160deg, #1a1f3a 0%, #0b1026 100%);
  transform: rotateY(180deg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 18px; text-align: center;
}
.front::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at 50% 30%, var(--card-glow, rgba(212,175,55,.12)), transparent 70%);
  pointer-events: none;
}
.card-symbol { font-size: 62px; margin-bottom: 10px; filter: drop-shadow(0 0 8px rgba(212,175,55,.5)); line-height: 1; }
.card-name { font-family: 'Cinzel', serif; font-size: 20px; color: var(--gold-light); letter-spacing: .12em; margin-bottom: 8px; }
.card-meaning { font-size: 13px; color: var(--cream); opacity: .85; line-height: 1.55; max-height: 90px; overflow: hidden; }
.card.active .face { border-color: rgba(240,214,138,.95); box-shadow: 0 0 35px rgba(212,175,55,.45); }
.card.active { filter: brightness(1.18); }
.gesture-hints {
  display: flex; gap: clamp(24px, 8vw, 80px); margin-top: 4px;
  color: var(--gold-dark); font-family: 'Cinzel', serif; font-size: 10px;
  letter-spacing: .15em; text-transform: uppercase; opacity: .75;
}
.hint { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.hint span { font-size: 22px; color: var(--gold); animation: bounce 2s infinite; }
.hint:nth-child(1) span { animation-delay: 0s; }
.hint:nth-child(3) span { animation-delay: 1s; }
.fist-icon { width: 18px; height: 18px; border: 2px solid var(--gold); border-radius: 50%; position: relative; }
.fist-icon::after { content: ''; position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px; background: var(--gold); border-radius: 50%; animation: pulse 1.5s infinite; }
@keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
@keyframes pulse { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(2); } }
.controls { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; z-index: 6; }
.controls button {
  background: linear-gradient(135deg, rgba(212,175,55,.18), rgba(212,175,55,.08));
  border: 1px solid rgba(212,175,55,.6); color: var(--gold-light);
  padding: 12px 20px; border-radius: 30px; cursor: pointer;
  font-family: inherit; font-size: 14px; letter-spacing: .06em;
  transition: all .25s; backdrop-filter: blur(4px);
  touch-action: manipulation; min-width: 90px;
}
.controls button:active { transform: scale(.96); }
.controls button:hover { background: linear-gradient(135deg, rgba(212,175,55,.32), rgba(212,175,55,.12)); box-shadow: 0 0 18px rgba(212,175,55,.25); }
.chat-panel {
  position: absolute; right: 0; top: 0; bottom: 0; width: min(460px, 100%);
  background: rgba(5,5,8,.94); border-left: 1px solid rgba(212,175,55,.2);
  display: flex; flex-direction: column; backdrop-filter: blur(22px);
  z-index: 10; transition: transform .5s ease;
  transform: translateX(100%);
}
.chat-panel.open { transform: translateX(0); }
.chat-header {
  padding: 16px 20px; border-bottom: 1px solid rgba(212,175,55,.15);
  display: flex; align-items: center; gap: 10px;
  font-family: 'Cinzel', serif; font-size: 13px; color: var(--gold);
  letter-spacing: .2em; text-transform: uppercase;
}
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); box-shadow: 0 0 10px var(--gold); animation: pulse-dot 1.5s infinite; }
@keyframes pulse-dot { 0% { opacity: 1; } 50% { opacity: .4; } 100% { opacity: 1; } }
.chat-messages { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 14px; }
.message { max-width: 92%; padding: 14px 18px; border-radius: 20px; font-size: 15px; line-height: 1.75; }
.message.user { align-self: flex-end; background: rgba(90,60,20,.55); border: 1px solid rgba(212,175,55,.25); color: var(--cream); }
.message.assistant { align-self: flex-start; background: rgba(20,20,35,.55); border: 1px solid rgba(212,175,55,.15); color: #e5e7eb; }
.message.assistant h1, .message.assistant h2, .message.assistant h3 { color: var(--gold); font-family: 'Cinzel', serif; font-size: 16px; margin: .9em 0 .4em; }
.message.assistant strong { color: var(--gold-light); }
.message.assistant p { margin: .5em 0; }
.message.assistant ul { padding-left: 1.2em; margin: .5em 0; }
.message.assistant li { margin: .3em 0; }
.thinking { display: flex; gap: 6px; padding: 12px 16px; }
.thinking span { width: 7px; height: 7px; background: var(--gold); border-radius: 50%; animation: think .8s infinite; }
.thinking span:nth-child(2) { animation-delay: .15s; }
.thinking span:nth-child(3) { animation-delay: .3s; }
@keyframes think { 0%,100% { opacity: .3; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-4px); } }
.chat-form { padding: 14px; display: flex; gap: 10px; border-top: 1px solid rgba(212,175,55,.15); }
.chat-form input {
  flex: 1; background: rgba(0,0,0,.45); border: 1px solid rgba(212,175,55,.25);
  border-radius: 24px; padding: 12px 18px; color: var(--cream);
  font-family: inherit; font-size: 15px; outline: none;
}
.chat-form input:focus { border-color: rgba(212,175,55,.55); }
.chat-form button {
  width: 44px; height: 44px; border-radius: 50%; border: none;
  background: linear-gradient(135deg, #9a7b2c, #5c4618); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer; transition: transform .2s;
}
.chat-form button:active { transform: scale(.92); }
.veil { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 20; }
.api-panel {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(11,16,38,.96); border: 1px solid var(--gold);
  border-radius: 18px; padding: 24px; width: min(380px, 90vw);
  z-index: 21; box-shadow: 0 0 60px rgba(0,0,0,.7);
}
.api-panel h3 { color: var(--gold-light); margin-bottom: 10px; font-family: 'Cinzel', serif; }
.api-panel p { font-size: 12px; color: var(--gold-dark); margin-bottom: 14px; line-height: 1.5; }
.api-panel select {
  width: 100%; padding: 11px 14px; border-radius: 8px;
  border: 1px solid var(--gold-dark); background: rgba(0,0,0,.4);
  color: var(--cream); margin-bottom: 12px; font-family: inherit; font-size: 15px;
}
.api-panel input {
  width: 100%; padding: 12px 14px; border-radius: 8px;
  border: 1px solid var(--gold-dark); background: rgba(0,0,0,.4);
  color: var(--cream); margin-bottom: 16px; font-family: inherit; font-size: 15px;
}
.panel-btns { display: flex; gap: 12px; justify-content: flex-end; }
.panel-btns button {
  padding: 10px 18px; border-radius: 20px;
  border: 1px solid rgba(212,175,55,.5); background: rgba(212,175,55,.12);
  color: var(--gold-light); font-family: inherit; cursor: pointer;
}
.panel-btns button:first-child { background: linear-gradient(135deg, #9a7b2c, #5c4618); color: #fff; border: none; }
@media (max-width: 768px) {
  .topbar { padding: 12px 16px; }
  .main { flex-direction: column; height: calc(100% - 50px); }
  .fan { height: 320px; }
  .card { width: 120px; height: 190px; margin-left: -60px; margin-top: -95px; }
  .card-symbol { font-size: 44px; }
  .card-name { font-size: 15px; }
  .chat-panel { position: fixed; inset: auto 0 0 0; height: 62vh; border-left: none; border-top: 1px solid rgba(212,175,55,.2); border-radius: 20px 20px 0 0; transform: translateY(110%); }
  .chat-panel.open { transform: translateY(0); }
}
@media (orientation: landscape) and (max-height: 600px) {
  .main { flex-direction: row; }
  .fan { height: 360px; }
  .chat-panel { height: 100%; width: 45vw; }
}
</style>
</head>
<body>
<div class="stars"></div>
<div class="fog fog1"></div>
<div class="fog fog2"></div>

<div id="intro" class="screen intro">
  <h1>MYSTIC VISION</h1>
  <p class="subtitle">灵启万物 · 手势塔罗</p>
  <div class="separator"></div>
  <label>镌刻你的困惑</label>
  <textarea id="question" placeholder="例如：我近期的事业发展如何？"></textarea>
  <button id="ascendBtn" class="ascend" disabled>ASCEND</button>
  <div id="initStatus" class="init-status">正在引导星界之力...</div>
</div>

<div id="stage" class="screen stage hidden">
  <div class="topbar">
    <div class="title-small">MYSTIC VISION</div>
    <div id="status" class="status">等待开始</div>
    <div class="top-actions">
      <button id="topReset" class="hidden">重新占卜</button>
      <button id="topApi">设置 AI Key</button>
    </div>
  </div>
  <video id="video" autoplay playsinline muted></video>
  <div class="main">
<div class="altar">
      <div class="altar-glow"></div>
      <canvas id="gestureCanvas" class="gesture-canvas"></canvas>
      <div class="ritual-ring"></div>
      <div id="fan" class="fan"></div>
      <div class="gesture-hints" id="hints">
        <div class="hint"><span>&#8592;</span><div>挥手左/右</div></div>
        <div class="hint"><div class="fist-icon"></div><div>握拳3秒翻牌</div></div>
        <div class="hint"><span>&#8594;</span><div>浏览牌组</div></div>
      </div>
      <div class="controls">
        <button id="prevBtn">&#8592; 上一张</button>
        <button id="flipBtn">翻牌</button>
        <button id="nextBtn">下一张 &#8594;</button>
        <button id="resetBtn" class="hidden">重新占卜</button>
        <button id="apiBtn">设置 AI Key</button>
      </div>
    </div>
    <div id="chatPanel" class="chat-panel">
      <div class="chat-header"><div class="dot"></div><span>Mystic Mentor</span></div>
      <div id="chatMessages" class="chat-messages"></div>
      <form id="chatForm" class="chat-form">
        <input id="chatInput" placeholder="继续追问细节..." autocomplete="off">
        <button type="submit" id="sendBtn">&#10148;</button>
      </form>
    </div>
  </div>
</div>

<div id="veil" class="veil hidden"></div>
<div id="apiPanel" class="api-panel hidden">
  <h3>设置 AI 密钥</h3>
  <p>密钥仅保存在本机浏览器中，不会上传。</p>
  <select id="apiProvider">
    <option value="gemini">Gemini (Google)</option>
    <option value="deepseek">DeepSeek</option>
  </select>
  <input id="apiKeyInput" type="text" placeholder="输入 API Key">
  <div class="panel-btns">
    <button id="saveApiBtn">保存</button>
    <button id="closeApiBtn">取消</button>
  </div>
</div>

<script>
(function() {
const TAROT_CARDS = [
  { id: 0, nameZh: '愚者', nameEn: 'The Fool', symbol: '✨', meaning: '自由、自发、纯真、崭新的开始', glow: 'rgba(212,175,55,.18)', deep: '愚者是一张充满无限可能的牌。它象征着旅程的起点、无畏的冒险精神以及对未知的开放态度。当这张牌出现，它在提醒你：即使前路未明，也请保持赤子之心与轻盈的步伐。此刻的你正站在悬崖边缘，但命运的风会托住你。放下过度计算，拥抱即兴与灵感，新的篇章才会真正开启。' },
  { id: 1, nameZh: '魔术师', nameEn: 'The Magician', symbol: '🎩', meaning: '力量、技艺、专注、行动、意志力', glow: 'rgba(155,89,182,.18)', deep: '魔术师代表你拥有将想法化为现实的全部资源。他的桌上摆放着四大元素的工具，暗示你的潜能已经具足，缺的只是专注与行动。这张牌出现时，请相信自己的技艺与沟通能力，用清晰的意图引导能量。它是一张关于显化的牌：愿望并非靠等待，而是靠你亲手编织。' },
  { id: 2, nameZh: '女祭司', nameEn: 'The High Priestess', symbol: '🌙', meaning: '直觉、神秘、潜意识、深处的智慧', glow: 'rgba(52,152,219,.18)', deep: '女祭司守护着潜意识的大门，邀请你在喧嚣中回归内在静默。她的出现意味着答案不在外界的追逐里，而在你深夜的梦境、突如其来的直觉与沉淀的直觉中。暂缓行动，更多地去观察、倾听与感受。那些无法言说的知识正在成形，等待你在合适的时机揭开面纱。' },

  { id: 7, nameZh: '战车', nameEn: 'The Chariot', symbol: '🏇', meaning: '意志力强、胜利、决心、自律、控制力', glow: 'rgba(127,140,141,.18)', deep: '战车象征着通过坚定意志与自律所获得的胜利。两匹方向相反的猛兽代表内在的冲突与外在的挑战，而驾驭者以专注与勇气让它们共同前进。这张牌告诉你：成功不会来自妥协或逃避，而是来自清晰的目标、情绪管理与持续前进。保持决心，你将穿越混乱抵达终点。' },

  { id: 14, nameZh: '节制', nameEn: 'Temperance', symbol: '🍶', meaning: '平衡、融合、耐心、适度、疗愈', glow: 'rgba(26,188,156,.18)', deep: '节制天使将两种水流交融，象征对立面的调和与中庸之道。这张牌提醒你避免极端，寻找生活各领域的平衡：工作与休息、付出与接受、理性与感性。疗愈是一个渐进的过程，耐心是关键。当你以温和而持续的方式整合内在冲突时，真正的和谐才会到来。' },

  { id: 16, nameZh: '高塔', nameEn: 'The Tower', symbol: '🗼', meaning: '突变、觉醒、破坏、剧烈的转变', glow: 'rgba(192,57,43,.2)', deep: '高塔代表突如其来的剧变，它摧毁的是建立在虚假之上的结构。虽然过程震撼甚至痛苦，但它为的是让你看清真相、释放不再适合你的部分。这张牌并非惩罚，而是一次强力的觉醒。当旧塔崩塌后，你会以更真实、更自由的地基重建人生。暴风雨之后，天空格外清澈。' },
  { id: 17, nameZh: '星星', nameEn: 'The Star', symbol: '⭐', meaning: '希望、灵感、宁静、疗愈、对未来的憧憬', glow: 'rgba(243,156,18,.18)', deep: '星星牌在黑夜中点亮希望，带来宁静、疗愈与灵性的指引。经历了风暴之后，它告诉你：伤口可以被浇灌成光。保持信念，相信自己的独特天赋，并以平和的心去憧憬未来。这张牌是一张温柔的承诺：宇宙正在倾听你的愿望，只要你愿意继续相信。' },
  { id: 18, nameZh: '月亮', nameEn: 'The Moon', symbol: '🌑', meaning: '不安、幻象、潜意识、隐藏的事实', glow: 'rgba(93,109,126,.18)', deep: '月亮映照出潜意识深处的迷雾、恐惧与未解的幻象。它提醒你，眼前所见未必是全部真相，某些信息仍被隐藏。与其在黑暗中奔跑，不如放慢脚步，分辨哪些是真实的危险，哪些只是内心的投影。透过面对恐惧、信任直觉，你会穿越迷雾，迎来黎明。' },
  { id: 19, nameZh: '太阳', nameEn: 'The Sun', symbol: '☀️', meaning: '成功、喜悦、活力、明朗、真理', glow: 'rgba(241,196,15,.2)', deep: '太阳牌带来最纯粹的光明、喜悦与成功。它象征真相大白、活力充沛与孩童般的纯真。当这张牌出现，意味着阴霾散去，你可以放心地展现真实的自己，并享受生命的礼物。这是塔罗中最吉利的牌之一，提醒你：快乐本身就有力量，让阳光照进你的心。' },
  { id: 20, nameZh: '审判', nameEn: 'Judgement', symbol: '🎺', meaning: '重生、呼唤、解脱、自我评价', glow: 'rgba(212,175,55,.2)', deep: '审判牌象征灵魂深处的觉醒与召唤。它代表一次重要的重生时刻：你可能听见内心真正的呼唤，决定摆脱旧有的自我评价，拥抱新的生命版本。这是一张关于宽恕、解脱与自我接纳的牌。当你回应内在的召唤，过去便不再束缚你，而你将迎来精神的复活。' },
  { id: 21, nameZh: '世界', nameEn: 'The World', symbol: '🌍', meaning: '完成、整合、成就、旅程的终点', glow: 'rgba(39,174,96,.18)', deep: '世界牌标志着一段旅程的圆满与成就。舞者被花环环绕，象征你与宇宙节奏的同步。这不是终点，而是一个完整循环的完成，为下一个循环做准备。抽到此牌，意味着你已经整合了所学的经验，值得庆祝自己的成长。带着这份圆满感，自信地迈入新的旅程。' }

const isMobile = /iPad|iPhone|iPod|Android|Mobile/i.test(navigator.userAgent);
let hands = null, camera = null, modelReady = false;
let activeIndex = Math.floor(TAROT_CARDS.length / 2);
let scrollOffset = activeIndex;
let isStarted = false, isFlipped = false, isAIThinking = false;
let lastHandX = null, lastStableX = null, fistStart = null, lastFistTime = null;
let apiProvider = 'gemini', apiKey = '';
let chatHistory = [], currentCard = null, userQuestion = '', activeMsgEl = null;
const FIST_HOLD = 3000, FIST_LOSS = 1200, SWIPE_THRESH = 0.045;

const video = document.getElementById('video');
const fan = document.getElementById('fan');
const statusEl = document.getElementById('status');
const intro = document.getElementById('intro');
const stage = document.getElementById('stage');
const ascendBtn = document.getElementById('ascendBtn');
const initStatus = document.getElementById('initStatus');
const chatPanel = document.getElementById('chatPanel');
const chatMessages = document.getElementById('chatMessages');
const chatForm = document.getElementById('chatForm');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const apiPanel = document.getElementById('apiPanel');
const veil = document.getElementById('veil');
const apiProviderSel = document.getElementById('apiProvider');
const apiKeyInput = document.getElementById('apiKeyInput');

const md = (typeof marked !== 'undefined') ? (t => marked.parse(t)) : (t => t.replace(/\n/g, '<br>'));

const canvas = document.getElementById('gestureCanvas');
const ctx = canvas.getContext('2d');
let particles = [], handVisible = false, handX = 0, handY = 0;

function setStatus(text) { statusEl.textContent = text; }

function loadSettings() {
  apiProvider = localStorage.getItem('tarot_api_provider') || 'gemini';
  apiKey = localStorage.getItem('tarot_api_key') || '';
  apiProviderSel.value = apiProvider;
}
function saveSettings() {
  localStorage.setItem('tarot_api_provider', apiProvider);
  localStorage.setItem('tarot_api_key', apiKey);
}

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
  canvas._w = rect.width;
  canvas._h = rect.height;
}

function emit(count, x, y, vxBase, vyBase, color, speed, life) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const sp = speed * (0.5 + Math.random());
    particles.push({
      x, y,
      vx: vxBase + Math.cos(angle) * sp,
      vy: vyBase + Math.sin(angle) * sp,
      life, maxLife: life,
      size: 1 + Math.random() * 2,
      color
    });
  }
}

function emitTrail(x, y) {
  emit(2, x, y, 0, 0, 'rgba(212,175,55,0.55)', 0.6, 28 + Math.random() * 18);
}

function emitWaveBurst(x, y, dir) {
  const color = dir > 0 ? 'rgba(240,214,138,0.9)' : 'rgba(212,175,55,0.9)';
  for (let i = 0; i < 28; i++) {
    const angle = (dir > 0 ? 0 : Math.PI) + (Math.random() - 0.5) * 1.3;
    const sp = 3 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * sp,
      vy: Math.sin(angle) * sp - 1 - Math.random(),
      life: 50, maxLife: 50,
      size: 2 + Math.random() * 2.5,
      color
    });
  }
}

function emitFistCharge(cx, cy, progress) {
  const count = progress < 0.85 ? 2 : 5;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r = 90 + Math.random() * 70;
    particles.push({
      x: cx + Math.cos(angle) * r,
      y: cy + Math.sin(angle) * r,
      vx: -Math.cos(angle) * (2 + progress * 4),
      vy: -Math.sin(angle) * (2 + progress * 4),
      life: 32, maxLife: 32,
      size: 2 + Math.random() * 2,
      color: `rgba(240,214,138,${0.55 + progress * 0.45})`
    });
  }
}

function emitFlipBurst(cx, cy) {
  for (let i = 0; i < 90; i++) {
    const angle = Math.random() * Math.PI * 2;
    const sp = 3 + Math.random() * 8;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * sp,
      vy: Math.sin(angle) * sp,
      life: 80, maxLife: 80,
      size: 2 + Math.random() * 3,
      color: `rgba(240,${214 - Math.random()*40|0},${138 - Math.random()*40|0},0.9)`
    });
  }
}

function updateParticles() {
  const w = canvas._w || canvas.getBoundingClientRect().width;
  const h = canvas._h || canvas.getBoundingClientRect().height;
  ctx.clearRect(0, 0, w, h);
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    p.vx *= 0.96;
    p.vy *= 0.96;
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
    if (p.life <= 0) particles.splice(i, 1);
  }
  ctx.globalAlpha = 1;
  requestAnimationFrame(updateParticles);
}

function trackHand(x, y) {
  const rect = canvas.getBoundingClientRect();
  const cx = (1 - x) * rect.width;
  const cy = y * rect.height;
  handX = cx; handY = cy; handVisible = true;
  emitTrail(cx, cy);
}

function initHands() {
  if (typeof Hands === 'undefined') {
    initStatus.textContent = '手势库加载失败，请刷新';
    return;
  }
  hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
  hands.setOptions({
    maxNumHands: 1,
    modelComplexity: isMobile ? 0 : 1,
    minDetectionConfidence: 0.65,
    minTrackingConfidence: 0.55
  });
  hands.onResults(onResults);
  modelReady = true;
  initStatus.textContent = '星界之力已就绪';
  ascendBtn.disabled = false;
}

async function startDivination() {
  userQuestion = document.getElementById('question').value.trim();
  if (!userQuestion) { alert('请先镌刻你的困惑'); return; }
  if (!modelReady) return;
  try {
    const win = window;
    camera = new win.Camera(video, {
      onFrame: async () => { if (hands && video) await hands.send({ image: video }); },
      width: 640, height: 480
    });
    await camera.start();
    intro.classList.add('hidden');
    stage.classList.remove('hidden');
    resizeCanvas();
    isStarted = true;
    renderFan();
    setStatus('挥动左手或右手浏览牌组，握拳3秒翻牌');
  } catch (err) {
    console.error(err);
    setStatus('摄像头权限被拒绝，请刷新重试');
  }
}

function checkIsFist(landmarks) {
  const tips = [8, 12, 16, 20];
  const pips = [6, 10, 14, 18];
  const wrist = landmarks[0];
  let curled = 0;
  for (let i = 0; i < tips.length; i++) {
    const tip = landmarks[tips[i]], pip = landmarks[pips[i]];
    const tipDist = Math.hypot(tip.x - wrist.x, tip.y - wrist.y);
    const pipDist = Math.hypot(pip.x - wrist.x, pip.y - wrist.y);
    if (tipDist < pipDist) curled++;
  }
  return curled >= 3;
}

function onResults(results) {
  if (!isStarted || isFlipped) return;
  const now = Date.now();
  const hasHand = results.multiHandLandmarks && results.multiHandLandmarks.length > 0;
  const N = TAROT_CARDS.length;
  if (hasHand) {
    const hand = results.multiHandLandmarks[0];
    const x = hand[9].x;
    const y = hand[9].y;
    const fist = checkIsFist(hand);
    trackHand(x, y);
    if (fist) {
      lastFistTime = now;
      if (!fistStart) fistStart = now;
      const elapsed = now - fistStart;
      setStatus(`握拳中 ${(elapsed / 1000).toFixed(1)}s / 3.0s`);
      const rect = canvas.getBoundingClientRect();
      emitFistCharge(rect.width / 2, rect.height / 2, elapsed / FIST_HOLD);
      if (elapsed >= FIST_HOLD) executeFlip();
    } else {
      const since = lastFistTime ? now - lastFistTime : Infinity;
      if (since > FIST_LOSS) {
        fistStart = null; lastFistTime = null;
        const target = (1 - x) * (N - 1);
        scrollOffset += (target - scrollOffset) * 0.12;
        const nextActive = Math.round(scrollOffset);
        if (nextActive !== activeIndex) { activeIndex = nextActive; }
        renderFan();
        setStatus('浏览牌组');
      }
    }
  } else {
    const since = lastFistTime ? now - lastFistTime : Infinity;
    if (since > FIST_LOSS) { fistStart = null; lastFistTime = null; }
    const target = Math.round(scrollOffset);
    scrollOffset += (target - scrollOffset) * 0.06;
    const nextActive = Math.round(scrollOffset);
    if (nextActive !== activeIndex) { activeIndex = nextActive; }
    renderFan();
  }
}

function renderFan() {
  fan.innerHTML = '';
  const N = TAROT_CARDS.length;
  const maxOffset = 6;
  const isSmall = window.innerWidth <= 768;
  const cardW = isSmall ? 120 : 170;
  const spread = isSmall ? 52 : 80;
  for (let i = 0; i < N; i++) {
    let offset = i - scrollOffset;
    if (offset > N / 2) offset -= N;
    if (offset < -N / 2) offset += N;
    if (Math.abs(offset) > maxOffset) continue;
    const card = TAROT_CARDS[i];
    const el = document.createElement('div');
    const isActive = Math.abs(offset) < 0.5;
    el.className = 'card' + (isActive ? ' active' : '') + (isFlipped && isActive ? ' flipped' : '');
    const rot = offset * 9;
    const tx = offset * spread;
    const tz = (1 - Math.abs(offset) / maxOffset) * 100;
    const scale = Math.max(0.55, 0.95 - Math.abs(offset) * 0.07) * (isActive ? 1.12 : 1);
    const z = 60 - Math.abs(offset);
    const opacity = Math.max(0.25, 1 - Math.abs(offset) * 0.18);
    el.style.width = cardW + 'px';
    el.style.height = (cardW * 1.588) + 'px';
    el.style.marginLeft = (-cardW / 2) + 'px';
    el.style.marginTop = (-cardW * 1.588 / 2) + 'px';
    el.style.transform = `translate(-50%, -50%) translateX(${tx}px) translateZ(${tz}px) rotate(${rot}deg) scale(${scale})`;
    el.style.zIndex = z;
    el.style.opacity = opacity;
    el.style.setProperty('--card-glow', card.glow || 'rgba(212,175,55,.12)');
    el.innerHTML = `
      <div class="card-inner">
        <div class="face back"></div>
        <div class="face front">
          <div class="card-symbol">${card.symbol}</div>
          <div class="card-name">${card.nameZh}</div>
          <div class="card-meaning">${card.meaning}</div>
        </div>
      </div>`;
    if (!isFlipped) {
      el.style.pointerEvents = 'auto';
      el.addEventListener('click', () => {
        const delta = ((i - activeIndex + N + Math.floor(N / 2)) % N) - Math.floor(N / 2);
        scrollOffset += delta;
        activeIndex = i;
        renderFan();
      });
    }
    fan.appendChild(el);
  }
}

function executeFlip() {
  if (isFlipped) return;
  isFlipped = true;
  activeIndex = ((Math.round(scrollOffset) % TAROT_CARDS.length) + TAROT_CARDS.length) % TAROT_CARDS.length;
  scrollOffset = activeIndex;
  currentCard = TAROT_CARDS[activeIndex];
  const flipRect = canvas.getBoundingClientRect();
  emitFlipBurst(flipRect.width / 2, flipRect.height / 2);
  renderFan();
  setStatus('星象已现 · 命运归位');
  chatPanel.classList.add('open');
  document.getElementById('hints').classList.add('hidden');
  document.getElementById('flipBtn').classList.add('hidden');
  document.getElementById('prevBtn').classList.add('hidden');
  document.getElementById('nextBtn').classList.add('hidden');
  document.getElementById('topReset').classList.remove('hidden');
  document.getElementById('resetBtn').classList.remove('hidden');
  initialReading();
}

function initialReading() {
  chatMessages.innerHTML = '';
  chatHistory = [];
  const question = userQuestion || '寻求命运的综合指引';
  const prompt = `【占卜启动】用户的具体问题是："${question}"。抽中的塔罗牌是：${currentCard.nameZh}（${currentCard.nameEn}）。牌面基础含义：${currentCard.meaning}。
请你作为 Mystic Vision 导师，围绕这张牌与用户的具体问题，撰写一篇 600-900 字的深度塔罗解读。请包含以下部分：
1. 牌面象征与核心讯息
2. 针对用户问题的现状分析
3. 潜在挑战与阴影面
4. 未来启示与行动建议
使用 Markdown 格式（标题、加粗、列表）增强可读性，语气专业、神秘且富有同理心。`;
  chatHistory.push({ role: 'user', content: prompt });
  addAssistantMsg();
  streamAI();
}

function appendUserMsg(text) {
  const div = document.createElement('div');
  div.className = 'message user';
  div.textContent = text;
  chatMessages.appendChild(div);
  scrollChat();
}

function addAssistantMsg() {
  activeMsgEl = document.createElement('div');
  activeMsgEl.className = 'message assistant';
  activeMsgEl.innerHTML = '<div class="thinking"><span></span><span></span><span></span></div>';
  chatMessages.appendChild(activeMsgEl);
  scrollChat();
}

function scrollChat() { chatMessages.scrollTop = chatMessages.scrollHeight; }

function updateMsg(el, text) {
  if (!el) return;
  el.innerHTML = md(text);
  scrollChat();
}

async function streamAI() {
  isAIThinking = true;
  sendBtn.disabled = true;
  let full = '';
  try {
    if (!apiKey) throw new Error('nokey');
    const stream = apiProvider === 'gemini' ? geminiStream() : deepseekStream();
    for await (const chunk of stream) {
      full += chunk;
      updateMsg(activeMsgEl, full);
    }
  } catch (err) {
    console.error(err);
    if (!apiKey || err.message === 'nokey') {
      full = `## ✨ ${currentCard.nameZh}（${currentCard.nameEn}）\n\n${currentCard.deep}\n\n---\n\n> 离线模式下仍可查看牌面深义。如需 AI 导师针对你的问题继续展开，请在「设置 AI Key」中填入 Gemini 或 DeepSeek Key。`;
    } else {
      full = `## ✨ ${currentCard.nameZh}（${currentCard.nameEn}）\n\n${currentCard.deep}\n\n---\n\n> 解读服务暂不可用：${err.message}`;
    }
    updateMsg(activeMsgEl, full);
  } finally {
    isAIThinking = false;
    sendBtn.disabled = false;
    chatHistory.push({ role: 'assistant', content: full });
    activeMsgEl = null;
  }
}

async function* geminiStream() {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:streamGenerateContent?key=${apiKey}&alt=sse`;
  const contents = chatHistory.map(m => ({ role: m.role === 'assistant' ? 'model' : 'user', parts: [{ text: m.content }] }));
  const resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ contents, generationConfig: { temperature: 0.8, maxOutputTokens: 2048 } })
  });
  if (!resp.ok) { const txt = await resp.text(); throw new Error(`${resp.status}: ${txt}`); }
  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop() || '';
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6).trim();
      if (data === '[DONE]') continue;
      try {
        const obj = JSON.parse(data);
        const text = obj.candidates?.[0]?.content?.parts?.[0]?.text || '';
        if (text) yield text;
      } catch (e) {}
    }
  }
}

async function* deepseekStream() {
  const url = 'https://api.deepseek.com/v1/chat/completions';
  const messages = [{ role: 'system', content: "你是资深塔罗占卜导师 Mystic Vision。请根据抽出的牌面含义和用户占卜场景，提供充满智慧、神秘感且富有同理心的深度解读。使用 Markdown 格式输出，字数 600-900 字，包含牌面象征、现状分析、挑战阴影与未来启示。" }];
  for (const m of chatHistory) messages.push({ role: m.role === 'user' ? 'user' : 'assistant', content: m.content });
  const resp = await fetch(url, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'deepseek-chat', messages, stream: true, temperature: 0.8, max_tokens: 2048 })
  });
  if (!resp.ok) { const txt = await resp.text(); throw new Error(`${resp.status}: ${txt}`); }
  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop() || '';
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6).trim();
      if (data === '[DONE]') continue;
      try {
        const obj = JSON.parse(data);
        const text = obj.choices?.[0]?.delta?.content || '';
        if (text) yield text;
      } catch (e) {}
    }
  }
}

function resetAll() {
  isFlipped = false;
  activeIndex = Math.floor(TAROT_CARDS.length / 2);
  scrollOffset = activeIndex;
  chatPanel.classList.remove('open');
  chatMessages.innerHTML = '';
  chatHistory = [];
  document.getElementById('hints').classList.remove('hidden');
  document.getElementById('flipBtn').classList.remove('hidden');
  document.getElementById('prevBtn').classList.remove('hidden');
  document.getElementById('nextBtn').classList.remove('hidden');
  document.getElementById('topReset').classList.add('hidden');
  document.getElementById('resetBtn').classList.add('hidden');
  renderFan();
  setStatus('挥动左手或右手浏览牌组，握拳3秒翻牌');
}

document.getElementById('ascendBtn').addEventListener('click', startDivination);
document.getElementById('prevBtn').addEventListener('click', () => { if (isFlipped) return; const N = TAROT_CARDS.length; scrollOffset -= 1; if (scrollOffset < 0) scrollOffset += N; activeIndex = Math.round(scrollOffset); renderFan(); setStatus('浏览牌组'); });
document.getElementById('nextBtn').addEventListener('click', () => { if (isFlipped) return; const N = TAROT_CARDS.length; scrollOffset += 1; if (scrollOffset >= N) scrollOffset -= N; activeIndex = Math.round(scrollOffset); renderFan(); setStatus('浏览牌组'); });
document.getElementById('flipBtn').addEventListener('click', executeFlip);
document.getElementById('resetBtn').addEventListener('click', resetAll);
document.getElementById('topReset').addEventListener('click', resetAll);
document.getElementById('apiBtn').addEventListener('click', () => {
  apiKeyInput.value = apiKey;
  apiPanel.classList.remove('hidden');
  veil.classList.remove('hidden');
});
document.getElementById('topApi').addEventListener('click', () => {
  apiKeyInput.value = apiKey;
  apiPanel.classList.remove('hidden');
  veil.classList.remove('hidden');
});
document.getElementById('saveApiBtn').addEventListener('click', () => {
  apiProvider = apiProviderSel.value;
  apiKey = apiKeyInput.value.trim();
  saveSettings();
  apiPanel.classList.add('hidden');
  veil.classList.add('hidden');
});
document.getElementById('closeApiBtn').addEventListener('click', () => {
  apiPanel.classList.add('hidden');
  veil.classList.add('hidden');
});
chatForm.addEventListener('submit', (e) => {
  e.preventDefault();
  if (!isFlipped || isAIThinking) return;
  const text = chatInput.value.trim();
  if (!text) return;
  appendUserMsg(text);
  chatHistory.push({ role: 'user', content: text });
  chatInput.value = '';
  addAssistantMsg();
  streamAI();
});

loadSettings();
initHands();
renderFan();
resizeCanvas();
updateParticles();
window.addEventListener('resize', resizeCanvas);
})();
</script>
