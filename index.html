 <!DOCTYPE html>
 <html lang="zh-CN">
 <head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
   <meta name="apple-mobile-web-app-capable" content="yes">
   <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
   <meta name="format-detection" content="telephone=no">
   <title>星象手势塔罗牌</title>
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
   <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
   <style>
     :root {
       --gold: #d4af37;
       --gold-light: #f0d68a;
       --gold-dark: #8a6e2f;
       --navy: #0b1026;
       --navy-light: #141b35;
       --cream: #f0e6d3;
     }
     * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
     html, body { height: 100%; }
     body {
       background:
         radial-gradient(ellipse at center, rgba(20, 27, 53, 0.9) 0%, rgba(6, 9, 20, 1) 70%),
         linear-gradient(135deg, #0b1026 0%, #050714 100%);
       color: var(--cream);
       font-family: 'Noto Serif SC', 'Cinzel', serif;
       overflow: hidden;
       display: flex;
       align-items: center;
       justify-content: center;
     }
     .stars {
       position: fixed;
       inset: 0;
       pointer-events: none;
       background-image:
         radial-gradient(2px 2px at 20px 30px, rgba(240, 214, 138, 0.8), transparent),
         radial-gradient(2px 2px at 40px 70px, rgba(240, 214, 138, 0.6), transparent),
         radial-gradient(1px 1px at 90px 40px, rgba(255, 255, 255, 0.7), transparent),
         radial-gradient(2px 2px at 160px 120px, rgba(240, 214, 138, 0.5), transparent),
         radial-gradient(1px 1px at 230px 80px, rgba(255, 255, 255, 0.6), transparent),
         radial-gradient(2px 2px at 300px 160px, rgba(240, 214, 138, 0.5), transparent),
         radial-gradient(1px 1px at 400px 50px, rgba(255, 255, 255, 0.7), transparent),
         radial-gradient(2px 2px at 500px 140px, rgba(240, 214, 138, 0.6), transparent);
       background-size: 520px 220px;
       opacity: 0.35;
       animation: twinkle 8s ease-in-out infinite alternate;
     }
     @keyframes twinkle { from { opacity: 0.25; } to { opacity: 0.5; } }
     .stage {
       position: relative;
       width: min(720px, 96vw);
       display: flex;
       flex-direction: column;
       align-items: center;
       gap: 18px;
       z-index: 2;
       padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
     }
     .title {
       font-family: 'Cinzel', serif;
       font-size: clamp(26px, 5vw, 42px);
       color: var(--gold-light);
       text-align: center;
       letter-spacing: 0.18em;
       text-shadow: 0 0 24px rgba(212, 175, 55, 0.45), 0 2px 8px rgba(0, 0, 0, 0.8);
     }
     .subtitle { font-size: 14px; color: var(--gold-dark); letter-spacing: 0.12em; }
     .video-frame {
       position: relative;
       width: 100%;
       border-radius: 24px;
       overflow: hidden;
       border: 2px solid rgba(212, 175, 55, 0.55);
       box-shadow:
         0 0 0 1px rgba(212, 175, 55, 0.2),
         0 0 60px rgba(212, 175, 55, 0.18),
         inset 0 0 80px rgba(0, 0, 0, 0.6);
       background: var(--navy-light);
     }
     .corner {
       position: absolute;
       width: 56px;
       height: 56px;
       border: 2px solid var(--gold);
       z-index: 3;
       pointer-events: none;
     }
     .corner.tl { top: 12px; left: 12px; border-right: none; border-bottom: none; border-top-left-radius: 14px; }
     .corner.tr { top: 12px; right: 12px; border-left: none; border-bottom: none; border-top-right-radius: 14px; }
     .corner.bl { bottom: 12px; left: 12px; border-right: none; border-top: none; border-bottom-left-radius: 14px; }
     .corner.br { bottom: 12px; right: 12px; border-left: none; border-top: none; border-bottom-right-radius: 14px; }
     video {
       width: 100%;
       display: block;
       transform: rotateY(180deg);
       min-height: 320px;
       object-fit: cover;
       background: #000;
     }
     .mandala {
       position: absolute;
       inset: 0;
       display: flex;
       align-items: center;
       justify-content: center;
       pointer-events: none;
       opacity: 0.12;
       z-index: 1;
     }
     .mandala svg { width: 78%; height: 78%; animation: spin 60s linear infinite; }
     @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
     #status {
       position: absolute;
       top: 18px;
       left: 50%;
       transform: translateX(-50%);
       background: rgba(11, 16, 38, 0.82);
       color: var(--gold-light);
       padding: 7px 18px;
       border-radius: 30px;
       font-size: 14px;
       border: 1px solid rgba(212, 175, 55, 0.45);
       backdrop-filter: blur(6px);
       z-index: 4;
       white-space: nowrap;
     }
     .overlay {
       position: absolute;
       bottom: 22px;
       left: 50%;
       transform: translateX(-50%);
       background: rgba(11, 16, 38, 0.88);
       padding: 18px 26px;
       border-radius: 18px;
       text-align: center;
       min-width: 260px;
       max-width: 86%;
       border: 1px solid rgba(212, 175, 55, 0.45);
       backdrop-filter: blur(10px);
       z-index: 4;
     }
     .card-name {
       font-family: 'Cinzel', serif;
       font-size: 26px;
       font-weight: 700;
       color: var(--gold-light);
       margin-bottom: 6px;
       text-shadow: 0 0 12px rgba(212, 175, 55, 0.35);
     }
     .card-meaning {
       font-size: 15px;
       line-height: 1.6;
       color: var(--cream);
       min-height: 48px;
     }
     .hint {
       font-size: 13px;
       color: var(--gold-dark);
       margin-top: 8px;
       font-style: italic;
     }
     .loading-dots::after {
       content: '...';
       animation: dots 1.2s steps(4) infinite;
     }
     @keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }
     .card-display {
       position: absolute;
       top: 50%;
       left: 50%;
       width: 160px;
       height: 260px;
       transform: translate(-50%, -50%);
       perspective: 1000px;
       z-index: 5;
       pointer-events: none;
       opacity: 0;
       transition: opacity 0.4s;
     }
     .card-display.show { opacity: 1; }
     .card-inner {
       width: 100%;
       height: 100%;
       position: relative;
       transform-style: preserve-3d;
       transition: transform 0.9s cubic-bezier(0.22, 1, 0.36, 1);
     }
     .card-display.flipped .card-inner { transform: rotateY(180deg); }
     .card-face {
       position: absolute;
       inset: 0;
       backface-visibility: hidden;
       -webkit-backface-visibility: hidden;
       border-radius: 16px;
       box-shadow: 0 12px 40px rgba(0, 0, 0, 0.55);
       overflow: hidden;
       border: 2px solid rgba(212, 175, 55, 0.65);
     }
     .card-back { background: url('card-back.png') center/cover no-repeat; }
     .card-front {
       background: linear-gradient(160deg, #161d3a 0%, #0b1026 100%);
       transform: rotateY(180deg);
       display: flex;
       flex-direction: column;
       align-items: center;
       justify-content: center;
       padding: 16px;
       text-align: center;
     }
     .card-front .arcana-symbol {
       font-size: 52px;
       margin-bottom: 8px;
       filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.5));
     }
     .card-front .arcana-name {
       font-family: 'Cinzel', serif;
       font-size: 18px;
       color: var(--gold-light);
       letter-spacing: 0.1em;
     }
     .controls {
       display: flex;
       gap: 12px;
       flex-wrap: wrap;
       justify-content: center;
       z-index: 3;
     }
     .btn {
       background: linear-gradient(135deg, rgba(212, 175, 55, 0.18), rgba(212, 175, 55, 0.08));
       border: 1px solid rgba(212, 175, 55, 0.6);
       color: var(--gold-light);
       padding: 14px 24px;
       border-radius: 30px;
       cursor: pointer;
       font-family: inherit;
       font-size: 16px;
       letter-spacing: 0.08em;
       transition: all 0.25s;
       backdrop-filter: blur(4px);
       touch-action: manipulation;
       -webkit-touch-callout: none;
       user-select: none;
       min-width: 120px;
     }
     .btn:active { transform: scale(0.96); }
     .btn:hover {
       background: linear-gradient(135deg, rgba(212, 175, 55, 0.32), rgba(212, 175, 55, 0.12));
       box-shadow: 0 0 20px rgba(212, 175, 55, 0.25);
       transform: translateY(-1px);
     }
     .api-panel {
       display: none;
       position: fixed;
       top: 50%;
       left: 50%;
       transform: translate(-50%, -50%);
       background: rgba(11, 16, 38, 0.96);
       border: 1px solid var(--gold);
       border-radius: 18px;
       padding: 24px;
       width: min(380px, 90vw);
       z-index: 20;
       box-shadow: 0 0 60px rgba(0, 0, 0, 0.7);
     }
     .api-panel.show { display: block; }
     .api-panel h3 { color: var(--gold-light); margin-bottom: 12px; font-family: 'Cinzel', serif; }
     .api-panel input {
       width: 100%;
       padding: 12px 14px;
       border-radius: 8px;
       border: 1px solid var(--gold-dark);
       background: rgba(0, 0, 0, 0.4);
       color: var(--cream);
       margin-bottom: 12px;
       font-family: inherit;
       font-size: 16px;
     }
     .api-panel p { font-size: 13px; color: var(--gold-dark); margin-bottom: 14px; line-height: 1.5; }
     .veil {
       display: none;
       position: fixed;
       inset: 0;
       background: rgba(0, 0, 0, 0.6);
       z-index: 19;
     }
     .veil.show { display: block; }
     .fist-bar {
       position: absolute;
       bottom: 0;
       left: 0;
       height: 3px;
       background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
       width: 0%;
       transition: width 0.1s linear;
       z-index: 4;
     }
     .ipad-note {
       position: absolute;
       top: 50%;
       left: 50%;
       transform: translate(-50%, -50%);
       width: 86%;
       max-width: 420px;
       background: rgba(11, 16, 38, 0.94);
       border: 1px solid rgba(212, 175, 55, 0.5);
       border-radius: 18px;
       padding: 22px;
       text-align: center;
       z-index: 6;
       display: none;
     }
     .ipad-note.show { display: block; }
     .ipad-note h4 { color: var(--gold-light); margin-bottom: 10px; font-family: 'Cinzel', serif; }
     .ipad-note p { font-size: 14px; line-height: 1.6; color: var(--cream); }
     @media (max-width: 768px) {
       .stage { gap: 12px; }
       .video-frame { border-radius: 18px; }
       .corner { width: 40px; height: 40px; }
       .overlay { padding: 14px 18px; min-width: 220px; }
       .card-name { font-size: 22px; }
       .card-display { width: 130px; height: 210px; }
       .btn { padding: 12px 18px; font-size: 15px; min-width: 100px; }
     }
     @media (orientation: landscape) and (max-height: 600px) {
       .stage { flex-direction: row; gap: 20px; align-items: center; justify-content: center; }
       .video-frame { width: 55vw; max-width: 520px; }
       .title-block { text-align: center; }
       .controls { flex-direction: column; width: auto; }
     }
   </style>
 </head>
 <body>
   <div class="stars"></div>
   <div class="veil" id="veil"></div>
   <div class="api-panel" id="apiPanel">
     <h3>设置 Gemini API Key</h3>
     <p>输入后可启用 AI 解读。若留空，将使用本地牌意库（离线可用）。<br>密钥仅保存在当前页面，不会上传。</p>
     <input type="text" id="apiKeyInput" placeholder="AIzaSy...">
     <div class="controls" style="margin:0">
       <button class="btn" id="saveKeyBtn">保存</button>
       <button class="btn" id="closePanelBtn">取消</button>
     </div>
   </div>
   <div class="stage">
     <div class="title-block">
       <div class="title">CELESTIAL TAROT</div>
       <div class="subtitle">星象手势塔罗牌</div>
     </div>
     <div class="video-frame" id="videoFrame">
       <div class="corner tl"></div>
       <div class="corner tr"></div>
       <div class="corner bl"></div>
       <div class="corner br"></div>
       <div class="mandala">
         <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
           <defs>
             <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
               <stop offset="0%" stop-color="#d4af37" stop-opacity="0.9"/>
               <stop offset="100%" stop-color="#8a6e2f" stop-opacity="0.5"/>
             </linearGradient>
           </defs>
           <circle cx="100" cy="100" r="92" fill="none" stroke="url(#g1)" stroke-width="0.5"/>
           <circle cx="100" cy="100" r="74" fill="none" stroke="url(#g1)" stroke-width="0.5" stroke-dasharray="4 4"/>
           <circle cx="100" cy="100" r="56" fill="none" stroke="url(#g1)" stroke-width="0.5"/>
           <path d="M100 20 L108 84 L170 84 L120 122 L138 184 L100 146 L62 184 L80 122 L30 84 L92 84 Z" fill="none" stroke="url(#g1)" stroke-width="0.7"/>
           <path d="M100 36 L104 92 L160 92 L112 124 L128 176 L100 140 L72 176 L88 124 L40 92 L96 92 Z" fill="none" stroke="url(#g1)" stroke-width="0.6"/>
           <circle cx="100" cy="100" r="12" fill="none" stroke="url(#g1)" stroke-width="0.7"/>
           <path d="M100 8 A8 8 0 0 1 108 16 A8 8 0 0 1 100 8 M100 192 A8 8 0 0 1 92 184 A8 8 0 0 1 100 192 M8 100 A8 8 0 0 1 16 92 A8 8 0 0 1 8 100 M192 100 A8 8 0 0 1 184 108 A8 8 0 0 1 192 100" fill="#d4af37" fill-opacity="0.7"/>
           <g stroke="url(#g1)" stroke-width="0.5">
             <line x1="100" y1="4" x2="100" y2="196"/>
             <line x1="4" y1="100" x2="196" y2="100"/>
             <line x1="30" y1="30" x2="170" y2="170"/>
             <line x1="170" y1="30" x2="30" y2="170"/>
           </g>
         </svg>
       </div>
       <video id="webcam" playsinline muted autoplay></video>
       <div class="ipad-note" id="ipadNote">
         <h4>📱 iPad 使用提示</h4>
         <p>首次使用请允许摄像头权限。<br>握拳 3 秒即可抽牌，也可点下方「手动抽牌」。<br>建议横屏放置 iPad，保持手部在画面中央。</p>
         <button class="btn" id="dismissNoteBtn" style="margin-top:14px">知道了</button>
       </div>
       <div class="card-display" id="cardDisplay">
         <div class="card-inner" id="cardInner">
           <div class="card-face card-back"></div>
           <div class="card-face card-front">
             <div class="arcana-symbol" id="arcanaSymbol">🌙</div>
             <div class="arcana-name" id="arcanaName">命运之轮</div>
           </div>
         </div>
       </div>
       <div class="overlay" id="overlay">
         <div class="card-name" id="cardName">🃏 命运之轮</div>
         <div class="card-meaning" id="cardMeaning">握拳保持 3 秒，从星象中抽一张牌</div>
         <div class="hint" id="hint">🤛 握拳 → 抽牌 → AI 解读</div>
       </div>
       <div class="fist-bar" id="fistBar"></div>
     </div>
     <div class="controls">
       <button class="btn" id="drawBtn">🎴 手动抽牌</button>
       <button class="btn" id="toggleCamBtn">📷 重开摄像头</button>
       <button class="btn" id="apiBtn">🔑 设置 API Key</button>
     </div>
   </div>
   <script>
     const GEMINI_API_KEY_PLACEHOLDER = '';
     let GEMINI_API_KEY = localStorage.getItem('tarot_gemini_key') || '';
     const TAROT_CARDS = [
       { name: '愚者', symbol: '🃏', meaning: '新的开始，勇敢迈出第一步' },
       { name: '魔术师', symbol: '✨', meaning: '你拥有创造奇迹的能力' },
       { name: '女祭司', symbol: '🌙', meaning: '倾听内心的声音' },
       { name: '皇后', symbol: '🌸', meaning: '丰盛与滋养正在到来' },
       { name: '皇帝', symbol: '👑', meaning: '稳定与秩序带来力量' },
       { name: '教皇', symbol: '📜', meaning: '寻求智慧导师的指引' },
       { name: '恋人', symbol: '💞', meaning: '重要的选择即将来临' },
       { name: '战车', symbol: '🏆', meaning: '坚定的意志带你征服挑战' },
       { name: '力量', symbol: '🦁', meaning: '温柔比强硬更有力量' },
       { name: '隐者', symbol: '🕯️', meaning: '独处中寻得智慧之光' },
       { name: '命运之轮', symbol: '☸️', meaning: '转变是唯一的永恒' },
       { name: '正义', symbol: '⚖️', meaning: '因果循环，一切平衡' },
       { name: '倒吊人', symbol: '🙃', meaning: '换个角度看世界' },
       { name: '死神', symbol: '💀', meaning: '结束即是新的开始' },
       { name: '节制', symbol: '🏺', meaning: '和谐与平衡是关键' },
       { name: '恶魔', symbol: '⛓️', meaning: '挣脱束缚你的枷锁' },
       { name: '高塔', symbol: '🌩️', meaning: '颠覆是为了重建' },
       { name: '星星', symbol: '⭐', meaning: '希望永远在前方' },
       { name: '月亮', symbol: '🌑', meaning: '相信你的直觉' },
       { name: '太阳', symbol: '☀️', meaning: '成功与喜悦照耀你' },
       { name: '审判', symbol: '📯', meaning: '觉醒的时刻到了' },
       { name: '世界', symbol: '🌍', meaning: '圆满与完成，恭喜！' }
     ];
     const isMobile = /iPad|iPhone|iPod|Android|Mobile/i.test(navigator.userAgent);
     const isIPad = /iPad/i.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
     let isFist = false;
     let fistStartTime = 0;
     let isProcessing = false;
     let currentCard = TAROT_CARDS[10];
     let stream = null;
     let hands = null;
     let frameCount = 0;
     const video = document.getElementById('webcam');
     const statusEl = document.getElementById('status');
     const cardNameEl = document.getElementById('cardName');
     const cardMeaningEl = document.getElementById('cardMeaning');
     const hintEl = document.getElementById('hint');
     const cardDisplay = document.getElementById('cardDisplay');
     const cardInner = document.getElementById('cardInner');
     const arcanaSymbol = document.getElementById('arcanaSymbol');
     const arcanaName = document.getElementById('arcanaName');
     const fistBar = document.getElementById('fistBar');
     const apiPanel = document.getElementById('apiPanel');
     const veil = document.getElementById('veil');
     const apiKeyInput = document.getElementById('apiKeyInput');
     const ipadNote = document.getElementById('ipadNote');
     function setStatus(text) { statusEl.textContent = text; }
     async function startCamera() {
       try {
         if (stream) { stream.getTracks().forEach(t => t.stop()); }
         const constraints = {
           video: {
             width: { ideal: isIPad ? 480 : 640 },
             height: { ideal: isIPad ? 360 : 480 },
             facingMode: 'user'
           },
           audio: false
         };
         stream = await navigator.mediaDevices.getUserMedia(constraints);
         video.srcObject = stream;
         await video.play();
         setStatus('✅ 摄像头已就绪');
         return true;
       } catch (e) {
         console.error(e);
         setStatus('❌ 摄像头被拒绝');
         cardMeaningEl.textContent = '请允许摄像头权限后刷新页面';
         return false;
       }
     }
     function initHands() {
       if (typeof Hands === 'undefined') {
         setStatus('⚠️ 手势库加载失败');
         return;
       }
       hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
       hands.setOptions({
         maxNumHands: 1,
         modelComplexity: isMobile ? 0 : 1,
         minDetectionConfidence: 0.65,
         minTrackingConfidence: 0.5
       });
       hands.onResults(onHandsResults);
     }
     function onHandsResults(results) {
       if (isProcessing) return;
       if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
         setStatus('✋ 请伸出手');
         resetFist();
         return;
       }
       const landmarks = results.multiHandLandmarks[0];
       const wrist = landmarks[0];
       const tipIndices = [4, 8, 12, 16, 20];
       let foldedCount = 0;
       for (let idx of tipIndices) {
         const dx = landmarks[idx].x - wrist.x;
         const dy = landmarks[idx].y - wrist.y;
         const dist = Math.sqrt(dx * dx + dy * dy);
         if (dist < 0.13) foldedCount++;
       }
       const isFistNow = (foldedCount >= 4);
       if (isFistNow) {
         setStatus('🤛 握拳中...');
         if (!isFist) {
           isFist = true;
           fistStartTime = Date.now();
         } else {
           const duration = (Date.now() - fistStartTime) / 1000;
           fistBar.style.width = Math.min((duration / 3) * 100, 100) + '%';
           if (duration >= 3 && !isProcessing) {
             pickCard();
             resetFist();
           }
         }
       } else {
         setStatus('🖐 张开手');
         resetFist();
       }
     }
     function resetFist() {
       isFist = false;
       fistStartTime = 0;
       fistBar.style.width = '0%';
     }
     function pickCard() {
       if (isProcessing) return;
       isProcessing = true;
       currentCard = TAROT_CARDS[Math.floor(Math.random() * TAROT_CARDS.length)];
       showCardBack();
       cardNameEl.textContent = `🃏 ${currentCard.name}`;
       cardMeaningEl.textContent = '🔮 AI 解读中...';
       cardMeaningEl.className = 'card-meaning loading-dots';
       hintEl.textContent = '⏳ 星象正在低语';
       setStatus('🧙 召唤中...');
       callGemini(currentCard);
     }
     function showCardBack() {
       cardDisplay.classList.add('show');
       cardDisplay.classList.remove('flipped');
     }
     function revealCard() {
       arcanaSymbol.textContent = currentCard.symbol;
       arcanaName.textContent = currentCard.name;
       cardDisplay.classList.add('flipped');
     }
     async function callGemini(card) {
       if (!GEMINI_API_KEY || GEMINI_API_KEY.length < 10) {
         useFallback(card);
         return;
       }
       try {
         const prompt = `你是一位资深的塔罗牌解读师。请用简洁、深刻、口语化的方式解读塔罗牌"${card.name}"。要求：1. 总共不超过60个字；2. 直接给出核心启示，不要说"这张牌代表..."；3. 语气像朋友聊天一样自然。`;
         const response = await fetch(
           `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`,
           {
             method: 'POST',
             headers: { 'Content-Type': 'application/json' },
             body: JSON.stringify({
               contents: [{ parts: [{ text: prompt }] }],
               generationConfig: { temperature: 0.8, maxOutputTokens: 100 }
             })
           }
         );
         if (!response.ok) {
           const err = await response.text();
           throw new Error(`API错误 ${response.status}: ${err}`);
         }
         const data = await response.json();
         const text = data.candidates?.[0]?.content?.parts?.[0]?.text || card.meaning;
         showResult(text, '✨ 已解读', '继续握拳抽下一张');
       } catch (error) {
         console.error('Gemini调用失败:', error);
         useFallback(card);
       } finally {
         isProcessing = false;
       }
     }
     function useFallback(card) {
       showResult(card.meaning, '📡 离线解读', '继续握拳抽下一张（离线模式）');
       isProcessing = false;
     }
     function showResult(text, status, hint) {
       cardMeaningEl.textContent = text;
       cardMeaningEl.className = 'card-meaning';
       hintEl.textContent = `🤛 ${hint}`;
       setStatus(status);
       revealCard();
     }
     async function loop() {
       if (video.readyState >= 2 && hands) {
         frameCount++;
         const skipRate = isMobile ? 2 : 1;
         if (frameCount % skipRate === 0) {
           try { await hands.send({ image: video }); } catch (e) {}
         }
       }
       requestAnimationFrame(loop);
     }
     async function init() {
       initHands();
       const ok = await startCamera();
       if (ok) {
         loop();
         if (isIPad && !localStorage.getItem('tarot_ipad_note_dismissed')) {
           ipadNote.classList.add('show');
         }
       }
     }
     document.getElementById('drawBtn').addEventListener('click', pickCard);
     document.getElementById('toggleCamBtn').addEventListener('click', startCamera);
     document.getElementById('apiBtn').addEventListener('click', () => {
       apiKeyInput.value = GEMINI_API_KEY;
       apiPanel.classList.add('show');
       veil.classList.add('show');
     });
     document.getElementById('saveKeyBtn').addEventListener('click', () => {
       GEMINI_API_KEY = apiKeyInput.value.trim();
       localStorage.setItem('tarot_gemini_key', GEMINI_API_KEY);
       apiPanel.classList.remove('show');
       veil.classList.remove('show');
       setStatus(GEMINI_API_KEY ? '🔑 API Key 已保存' : '✅ 摄像头已就绪');
     });
     document.getElementById('closePanelBtn').addEventListener('click', () => {
       apiPanel.classList.remove('show');
       veil.classList.remove('show');
     });
     document.getElementById('dismissNoteBtn').addEventListener('click', () => {
       ipadNote.classList.remove('show');
       localStorage.setItem('tarot_ipad_note_dismissed', '1');
     });
     init();
   </script>
 </body>
 </html>
